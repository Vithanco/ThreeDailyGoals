<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Three Daily Goals — iOS UI Kit</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 24px;
    gap: 0;
  }
  .kit-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px; align-self: flex-start;
  }
  .kit-header img { width: 32px; height: 32px; border-radius: 8px; }
  .kit-header h1 { color: #fff; font-size: 18px; font-weight: 700; }
  .kit-header span { color: #EA580C; font-size: 13px; }
  .screens-row {
    display: flex; gap: 32px; align-items: flex-start;
    flex-wrap: nowrap; overflow-x: auto;
    padding-bottom: 16px; max-width: 100%;
  }
  .screen-col { display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; }
  .screen-label { color: #888; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  /* Phone shell */
  .phone-shell {
    width: 393px; height: 852px;
    background: #F2F2F7;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08), inset 0 0 0 1px rgba(0,0,0,0.3);
    display: flex; flex-direction: column;
  }
  /* Notch */
  .phone-notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000; border-radius: 0 0 20px 20px; z-index: 200;
  }
  /* Side buttons */
  .phone-shell::before {
    content: ''; position: absolute;
    left: -3px; top: 120px; width: 3px; height: 32px;
    background: #555; border-radius: 2px 0 0 2px;
    box-shadow: 0 44px 0 #555, 0 88px 0 #555;
  }
  .phone-shell::after {
    content: ''; position: absolute;
    right: -3px; top: 160px; width: 3px; height: 64px;
    background: #555; border-radius: 0 2px 2px 0;
  }
</style>
</head>
<body>

<div class="kit-header">
  <img src="../../assets/logo.png" alt="Three Daily Goals"/>
  <div>
    <h1>Three Daily Goals</h1>
    <span>iOS App UI Kit — Click to navigate between screens</span>
  </div>
</div>

<div class="screens-row" id="root"></div>

<script type="text/babel">
const { useState } = React;

// ── Sample Data ──────────────────────────────────────────────────────────────
const SAMPLE_TASKS = [
  { id: 1, title: 'Write the quarterly review doc', quadrant: 'deepWork',  due: 'in 3 days', dueUrgent: false, state: 'priority', tags: ['big-task', 'high-energy'], notes: 'Include Q2 metrics and roadmap.', history: [{date: 'Apr 28', note: 'Added task'}, {date: 'May 1', note: 'Set as priority'}] },
  { id: 2, title: 'Fix login bug in production',     quadrant: 'sprint',   due: 'tomorrow',  dueUrgent: true,  state: 'priority', tags: ['small-task', 'high-energy'], notes: '', history: [{date: 'May 2', note: 'Added task'}] },
  { id: 3, title: 'Prepare demo for stakeholders',   quadrant: 'deepWork', due: null,         dueUrgent: false, state: 'priority', tags: ['big-task', 'high-energy'], notes: '', history: [] },
  { id: 4, title: 'Reply to Simon\'s email',         quadrant: 'easyWin', due: null,         dueUrgent: false, state: 'open',     tags: ['small-task', 'low-energy'], notes: '', history: [{date: 'Apr 30', note: 'Added task'}] },
  { id: 5, title: 'Refactor data layer',             quadrant: 'steady',  due: null,         dueUrgent: false, state: 'open',     tags: ['big-task', 'low-energy'],   notes: 'Move to new architecture pattern.', history: [] },
  { id: 6, title: 'Update app icon design',          quadrant: 'sprint',  due: null,         dueUrgent: false, state: 'open',     tags: ['small-task', 'high-energy'], notes: '', history: [] },
  { id: 7, title: 'Research competitors pricing',    quadrant: null,      due: null,         dueUrgent: false, state: 'open',     tags: [], notes: '', history: [] },
  { id: 8, title: 'Review PR from contributor',      quadrant: 'easyWin', due: null,         dueUrgent: false, state: 'pending',  tags: ['small-task', 'low-energy'], notes: '', history: [] },
  { id: 9, title: 'Learn SwiftData migrations',      quadrant: 'steady',  due: null,         dueUrgent: false, state: 'open',     tags: ['big-task', 'low-energy'],  notes: '', history: [] },
  { id: 10, title: 'Build onboarding flow',          quadrant: 'deepWork', due: null,        dueUrgent: false, state: 'open',    tags: ['big-task', 'high-energy'],  notes: '', history: [] },
  { id: 11, title: 'Write Medium article about TDG', quadrant: null,       due: null,        dueUrgent: false, state: 'dead',    tags: [], notes: 'Idea from 3 months ago.', history: [{date: 'Feb 1', note: 'Added task'}, {date: 'May 3', note: 'Moved to Graveyard (30 days)'}] },
  { id: 12, title: 'Set up linear.app for project',  quadrant: null,       due: null,        dueUrgent: false, state: 'dead',    tags: [], notes: '', history: [{date: 'Jan 15', note: 'Added task'}, {date: 'Feb 14', note: 'Moved to Graveyard (30 days)'}] },
  { id: 13, title: 'Create YouTube tutorial',        quadrant: null,       due: null,        dueUrgent: false, state: 'dead',    tags: [], notes: '', history: [{date: 'Mar 1', note: 'Added task'}, {date: 'Mar 31', note: 'Moved to Graveyard (30 days)'}] },
];

const COMPASS_STEPS = [
  {
    title: 'Current Priorities',
    content: (tasks) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <p style={{ fontSize: 15, color: '#555', marginBottom: 4 }}>How did you do on yesterday's goals?</p>
        {tasks.filter(t => t.state === 'priority').map(t => (
          <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: '#FAFAFA', borderRadius: 10, border: '1px solid #EEE' }}>
            <EEMIndicator quadrant={t.quadrant} />
            <span style={{ flex: 1, fontSize: 14 }}>{t.title}</span>
            <div style={{ display: 'flex', gap: 6 }}>
              <button style={{ padding: '4px 8px', borderRadius: 6, border: '1px solid #34C759', background: 'rgba(52,199,89,0.1)', color: '#1A7A35', fontSize: 12, cursor: 'pointer' }}>✓ Done</button>
            </div>
          </div>
        ))}
      </div>
    ),
  },
  {
    title: 'Kill Stale Tasks',
    content: (tasks) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <div style={{ background: 'rgba(162,132,94,0.08)', border: '1px solid rgba(162,132,94,0.3)', borderRadius: 10, padding: '12px 14px' }}>
          <p style={{ fontSize: 14, fontWeight: 600, color: '#A2845E', marginBottom: 4 }}>⬜ 3 tasks ignored for 30+ days</p>
          <p style={{ fontSize: 12, color: '#777' }}>These will be moved to the Graveyard. You can always revive them.</p>
        </div>
        {tasks.filter(t => t.state === 'dead').map(t => (
          <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: 'rgba(162,132,94,0.06)', borderRadius: 10, border: '1px solid rgba(162,132,94,0.2)' }}>
            <span style={{ flex: 1, fontSize: 13, color: '#888' }}>{t.title}</span>
            <button style={{ padding: '3px 8px', borderRadius: 5, border: '1px solid #007AFF', background: 'rgba(0,122,255,0.08)', color: '#007AFF', fontSize: 11, cursor: 'pointer' }}>Revive</button>
          </div>
        ))}
      </div>
    ),
  },
  {
    title: 'Choose Next Priorities',
    content: (tasks, setScreen) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <p style={{ fontSize: 14, color: TDG_COLORS.priority, fontWeight: 600 }}>Swipe right to set as Priority ★</p>
        {tasks.filter(t => t.state === 'open').slice(0, 5).map(t => (
          <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '9px 12px', background: '#FAFAFA', borderRadius: 10, border: '1px solid #EEE' }}>
            <EEMIndicator quadrant={t.quadrant} />
            <span style={{ flex: 1, fontSize: 14 }}>{t.title}</span>
            <button style={{ padding: '3px 8px', borderRadius: 5, border: `1px solid ${TDG_COLORS.priority}`, background: `rgba(255,149,0,0.1)`, color: TDG_COLORS.priority, fontSize: 11, cursor: 'pointer' }}>★</button>
          </div>
        ))}
        <button style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '8px', borderRadius: 8, border: `1px dashed ${TDG_COLORS.neutral300}`, background: 'transparent', color: TDG_COLORS.open, fontSize: 13, cursor: 'pointer' }}>
          ⊕ Add New Task
        </button>
      </div>
    ),
  },
  {
    title: 'Plan the Day',
    content: (tasks) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <p style={{ fontSize: 14, color: '#555' }}>Your three goals for tomorrow:</p>
        {tasks.filter(t => t.state === 'priority').slice(0, 3).map((t, i) => (
          <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', background: 'rgba(255,149,0,0.07)', borderRadius: 10, border: `1px solid rgba(255,149,0,0.2)` }}>
            <span style={{ fontSize: 20, fontWeight: 800, color: 'rgba(255,149,0,0.4)', width: 24 }}>{i+1}</span>
            <EEMIndicator quadrant={t.quadrant} />
            <span style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{t.title}</span>
          </div>
        ))}
        <div style={{ background: '#f7f7f7', border: '1px solid rgba(234,88,12,0.3)', borderLeft: '5px solid #EA580C', borderRadius: '0 8px 8px 0', padding: '10px 12px', marginTop: 4 }}>
          <p style={{ fontSize: 12, fontStyle: 'italic', color: '#555', textAlign: 'center' }}>"Finally, a task manager that doesn't make me feel behind." — <strong>Lena, designer</strong></p>
        </div>
      </div>
    ),
  },
];

// ── Screen: Today (Priority List) ────────────────────────────────────────────
function ScreenToday({ tasks, onTaskTap, onCompassCheck, onListSelect }) {
  const priorityTasks = tasks.filter(t => t.state === 'priority');
  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden', background: '#F2F2F7' }}>
      <StatusBar />
      <NavBar
        title="Today"
        rightItems={[
          <span key="compass" onClick={onCompassCheck} style={{ color: TDG_COLORS.accent, fontSize: 20, cursor: 'pointer' }} title="Compass Check">◎</span>,
          <span key="add" style={{ color: TDG_COLORS.open, fontSize: 22, cursor: 'pointer' }} title="Add task">⊕</span>,
        ]}
        bg="#F2F2F7"
      />
      <div style={{ flex: 1, overflowY: 'auto', padding: '10px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {/* Streak / Compass Check widget */}
        <StreakWidget streak={14} done={false} onCompassCheck={onCompassCheck} />
        {/* Today's goals header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 2px' }}>
          <span style={{ color: TDG_COLORS.priority, fontSize: 18 }}>★</span>
          <span style={{ fontSize: 17, fontWeight: 700, color: '#111' }}>Today's Goals</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: TDG_COLORS.priority, background: 'rgba(255,149,0,0.15)', padding: '1px 7px', borderRadius: 10 }}>{priorityTasks.length}</span>
        </div>
        {/* Priority tasks */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
          {priorityTasks.length === 0
            ? <div style={{ padding: '16px 8px', textAlign: 'center', color: '#aaa', fontSize: 13, fontStyle: 'italic', background: '#fff', borderRadius: 8, border: `1px solid ${TDG_COLORS.neutral200}` }}>No priorities set yet. Start Compass Check to plan your day.</div>
            : priorityTasks.map(t => <TaskRow key={t.id} title={t.title} quadrant={t.quadrant} due={t.due} dueUrgent={t.dueUrgent} onTap={() => onTaskTap(t)} />)
          }
        </div>
        {/* LISTS section header */}
        <div style={{ marginTop: 8, padding: '0 2px 4px' }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: TDG_COLORS.neutral500, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Lists</span>
        </div>
        {/* Sidebar list links */}
        <SidebarLinks active="open" onSelect={onListSelect} />
      </div>
    </div>
  );
}

// ── Screen: Open Tasks ───────────────────────────────────────────────────────
function ScreenOpenList({ tasks, onTaskTap, onBack }) {
  const [activeTag, setActiveTag] = useState(null);
  const openTasks = tasks.filter(t => t.state === 'open');
  const allTags = [...new Set(openTasks.flatMap(t => t.tags))];
  const filtered = activeTag ? openTasks.filter(t => t.tags.includes(activeTag)) : openTasks;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden', background: '#F2F2F7' }}>
      <StatusBar />
      <NavBar
        title="Open"
        leftItems={[<span key="back" onClick={onBack} style={{ color: TDG_COLORS.open, fontSize: 14, cursor: 'pointer' }}>‹ Today</span>]}
        rightItems={[
          <span key="compass" style={{ color: TDG_COLORS.accent, fontSize: 19, cursor: 'pointer' }}>◎</span>,
          <span key="add" style={{ color: TDG_COLORS.open, fontSize: 22, cursor: 'pointer' }}>⊕</span>,
        ]}
      />
      <div style={{ flex: 1, overflowY: 'auto', padding: '10px 14px', display: 'flex', flexDirection: 'column', gap: 5 }}>
        {/* Section sub-header like real app */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '2px 2px 4px' }}>
          <span style={{ color: TDG_COLORS.open, fontSize: 16 }}>○</span>
          <span style={{ fontSize: 17, fontWeight: 700, color: '#111' }}>Open</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: TDG_COLORS.open, background: 'rgba(0,122,255,0.12)', padding: '1px 7px', borderRadius: 10 }}>{filtered.length}</span>
        </div>
        {/* Section grouping: Last Quarter */}
        <div style={{ fontSize: 12, color: TDG_COLORS.open, fontWeight: 500, padding: '6px 2px 2px', opacity: 0.7 }}>○ Last updated: Last Quarter</div>
        {filtered.slice(0, 3).map(t => <TaskRow key={t.id} title={t.title} quadrant={t.quadrant} due={t.due} dueUrgent={t.dueUrgent} onTap={() => onTaskTap(t)} />)}
        <div style={{ fontSize: 12, color: TDG_COLORS.open, fontWeight: 500, padding: '6px 2px 2px', opacity: 0.7 }}>○ Last updated: Last Month</div>
        {filtered.slice(3).map(t => <TaskRow key={t.id} title={t.title} quadrant={t.quadrant} due={t.due} dueUrgent={t.dueUrgent} onTap={() => onTaskTap(t)} />)}
        {/* Tag filter pills at bottom — muted, like real app */}
        {allTags.length > 0 && (
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', padding: '10px 2px 4px', borderTop: `1px solid ${TDG_COLORS.neutral200}`, marginTop: 4 }}>
            {allTags.map(tag => (
              <button key={tag} onClick={() => setActiveTag(activeTag === tag ? null : tag)} style={{
                padding: '3px 9px', borderRadius: 4,
                border: 'none',
                background: activeTag === tag ? TDG_COLORS.open : TDG_COLORS.neutral300,
                color: activeTag === tag ? '#fff' : '#555',
                fontSize: 11, fontWeight: 500, cursor: 'pointer',
              }}>{tag}</button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Screen: Task Detail ──────────────────────────────────────────────────────
function ScreenTaskDetail({ task, onBack, onStateChange }) {
  const stateColors = { priority: TDG_COLORS.priority, open: TDG_COLORS.open, pending: TDG_COLORS.pending, closed: TDG_COLORS.closed, dead: TDG_COLORS.dead };
  const stateIcon = { priority: '★', open: '○', pending: '◷', closed: '✓', dead: '⬜' };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden' }}>
      <StatusBar />
      <NavBar
        title=""
        leftItems={[<span key="back" onClick={onBack} style={{ color: '#007AFF', fontSize: 14, cursor: 'pointer' }}>‹ Back</span>]}
        rightItems={[
          <span key="close" style={{ color: TDG_COLORS.closed, fontSize: 14, cursor: 'pointer' }}>✓ Done</span>,
        ]}
        bg="#fff"
      />
      <div style={{ flex: 1, overflowY: 'auto', padding: '12px 14px 20px' }}>
        <TaskDetailView task={task} onStateChange={onStateChange} />
      </div>
    </div>
  );
}

// ── Screen: Compass Check ────────────────────────────────────────────────────
function ScreenCompassCheck({ tasks, onDone }) {
  const [step, setStep] = useState(0);
  const total = COMPASS_STEPS.length;
  const current = COMPASS_STEPS[step];

  return (
    <CompassCheckDialog
      step={step}
      totalSteps={total}
      stepTitle={current.title}
      stepContent={
        <div>
          <h2 style={{ fontSize: 17, fontWeight: 700, color: TDG_COLORS.priority, marginBottom: 14 }}>{current.title}</h2>
          {current.content(tasks)}
        </div>
      }
      onBack={() => setStep(s => Math.max(0, s - 1))}
      onNext={() => { if (step < total - 1) setStep(s => s + 1); else onDone(); }}
      onCancel={onDone}
      nextLabel={step === total - 1 ? 'Done ✓' : 'Next →'}
    />
  );
}

// ── Screen: Graveyard ────────────────────────────────────────────────────────
function ScreenGraveyard({ tasks, onTaskTap, onBack }) {
  const deadTasks = tasks.filter(t => t.state === 'dead');
  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden', background: '#F2F2F7' }}>
      <StatusBar />
      <NavBar
        title="Graveyard"
        leftItems={[<span key="back" onClick={onBack} style={{ color: TDG_COLORS.open, fontSize: 14, cursor: 'pointer' }}>‹ Today</span>]}
      />
      <div style={{ flex: 1, overflowY: 'auto', padding: '10px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '2px 2px 4px' }}>
          <span style={{ color: TDG_COLORS.dead, fontSize: 15 }}>▦</span>
          <span style={{ fontSize: 17, fontWeight: 700, color: '#111' }}>Graveyard</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: TDG_COLORS.dead, background: 'rgba(162,132,94,0.15)', padding: '1px 7px', borderRadius: 10 }}>{deadTasks.length}</span>
        </div>
        {/* Info callout */}
        <div style={{ background: '#fff', border: `1px solid ${TDG_COLORS.neutral200}`, borderRadius: 10, padding: '10px 14px' }}>
          <p style={{ fontSize: 12, color: '#777', lineHeight: 1.5 }}>Tasks untouched for 30 days are moved here automatically. About 30% of tasks end here — and you won't miss them.</p>
        </div>
        {/* Tasks */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
          {deadTasks.map(t => (
            <TaskRow key={t.id} title={t.title} quadrant={t.quadrant} onTap={() => onTaskTap(t)} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [tasks, setTasks] = useState(SAMPLE_TASKS);
  const [screen1, setScreen1] = useState('today');
  const [screen2, setScreen2] = useState('open');
  const [screen3, setScreen3] = useState('compass');
  const [selectedTask1, setSelectedTask1] = useState(null);
  const [selectedTask2, setSelectedTask2] = useState(null);

  const handleStateChange = (taskId, newState, setTask) => {
    setTasks(prev => prev.map(t => t.id === taskId ? { ...t, state: newState } : t));
    setTask(prev => prev ? { ...prev, state: newState } : prev);
  };

  const renderScreen = (screen, setScreen, selectedTask, setSelectedTask, phoneIndex) => {
    // Show task detail if a task is selected
    if (selectedTask) {
      return (
        <ScreenTaskDetail
          task={selectedTask}
          onBack={() => setSelectedTask(null)}
          onStateChange={(ns) => handleStateChange(selectedTask.id, ns, setSelectedTask)}
        />
      );
    }
    switch (screen) {
      case 'today':
        return <ScreenToday tasks={tasks} onTaskTap={setSelectedTask} onCompassCheck={() => setScreen('compass')} onListSelect={s => setScreen(s)} />;
      case 'open':
        return <ScreenOpenList tasks={tasks} onTaskTap={setSelectedTask} onBack={() => setScreen('today')} />;
      case 'compass':
        return <ScreenCompassCheck tasks={tasks} onDone={() => setScreen('today')} />;
      case 'dead':
        return <ScreenGraveyard tasks={tasks} onTaskTap={setSelectedTask} onBack={() => setScreen('today')} />;
      default:
        return <ScreenToday tasks={tasks} onTaskTap={setSelectedTask} onCompassCheck={() => setScreen('compass')} onListSelect={s => setScreen(s)} />;
    }
  };

  const screenLabels = { today: 'Today / Priority', open: 'Open Tasks', compass: 'Compass Check', dead: 'Graveyard', pending: 'Pending' };

  return (
    <>
      {/* Phone 1: Today */}
      <div className="screen-col">
        <div className="phone-shell" data-screen-label="01 Today">
          <div className="phone-notch"></div>
          {renderScreen(screen1, setScreen1, selectedTask1, setSelectedTask1, 1)}
        </div>
        <div className="screen-label">{selectedTask1 ? 'Task Detail' : screenLabels[screen1]}</div>
      </div>

      {/* Phone 2: Open List */}
      <div className="screen-col">
        <div className="phone-shell" data-screen-label="02 Open List">
          <div className="phone-notch"></div>
          {renderScreen(screen2, setScreen2, selectedTask2, setSelectedTask2, 2)}
        </div>
        <div className="screen-label">{selectedTask2 ? 'Task Detail' : screenLabels[screen2]}</div>
      </div>

      {/* Phone 3: Compass Check */}
      <div className="screen-col">
        <div className="phone-shell" data-screen-label="03 Compass Check">
          <div className="phone-notch"></div>
          {renderScreen(screen3, setScreen3, null, () => {}, 3)}
        </div>
        <div className="screen-label">{screenLabels[screen3]}</div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
