<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { font-family: var(--font-sans); background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; margin-bottom: 4px; }
  .spacing-row { display: flex; align-items: center; gap: 12px; }
  .bar { background: #EA580C; height: 12px; border-radius: 2px; opacity: 0.7; }
  .sp-label { font-size: 11px; font-family: monospace; color: #888; width: 60px; }
  .sp-val   { font-size: 11px; color: #bbb; width: 32px; }

  .radius-row { display: flex; gap: 12px; align-items: flex-end; }
  .rbox { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .rchip { width: 52px; height: 36px; background: #EA580C; opacity: 0.6; }
  .rlabel { font-size: 9px; color: #888; font-family: monospace; text-align: center; }

  .shadow-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .shadow-box { width: 80px; height: 50px; background: #fff; border-radius: 8px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; }
  .shadow-label { font-size: 9px; color: #888; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
  <div>
    <div class="section-title">Spacing Scale</div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      <div class="spacing-row"><div class="sp-label">--space-1</div><div class="bar" style="width:4px;"></div><div class="sp-val">4px</div></div>
      <div class="spacing-row"><div class="sp-label">--space-2</div><div class="bar" style="width:8px;"></div><div class="sp-val">8px</div></div>
      <div class="spacing-row"><div class="sp-label">--space-3</div><div class="bar" style="width:12px;"></div><div class="sp-val">12px</div></div>
      <div class="spacing-row"><div class="sp-label">--space-4</div><div class="bar" style="width:16px;"></div><div class="sp-val">16px</div></div>
      <div class="spacing-row"><div class="sp-label">--space-5</div><div class="bar" style="width:20px;"></div><div class="sp-val">20px</div></div>
      <div class="spacing-row"><div class="sp-label">--space-6</div><div class="bar" style="width:24px;"></div><div class="sp-val">24px</div></div>
      <div class="spacing-row"><div class="sp-label">--space-8</div><div class="bar" style="width:32px;"></div><div class="sp-val">32px</div></div>
      <div class="spacing-row"><div class="sp-label">--space-12</div><div class="bar" style="width:48px;"></div><div class="sp-val">48px</div></div>
    </div>
  </div>
  <div>
    <div class="section-title">Border Radius</div>
    <div class="radius-row">
      <div class="rbox"><div class="rchip" style="border-radius:2px;"></div><div class="rlabel">2px<br>nav pill</div></div>
      <div class="rbox"><div class="rchip" style="border-radius:4px;"></div><div class="rlabel">4px<br>tag</div></div>
      <div class="rbox"><div class="rchip" style="border-radius:6px;"></div><div class="rlabel">6px<br>button</div></div>
      <div class="rbox"><div class="rchip" style="border-radius:8px;"></div><div class="rlabel">8px<br>widget</div></div>
      <div class="rbox"><div class="rchip" style="border-radius:10px;"></div><div class="rlabel">10px<br>card</div></div>
      <div class="rbox"><div class="rchip" style="border-radius:12px;"></div><div class="rlabel">12px<br>list</div></div>
    </div>
  </div>
  <div>
    <div class="section-title">Shadows</div>
    <div class="shadow-row">
      <div style="display:flex;flex-direction:column;gap:4px;align-items:center;">
        <div class="shadow-box" style="box-shadow:rgba(0,0,0,0.15) 0px 3px 6px;"></div>
        <div class="shadow-label">card</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:center;">
        <div class="shadow-box" style="box-shadow:rgba(100,100,111,0.2) 0px 7px 29px 0px;"></div>
        <div class="shadow-label">widget</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:center;">
        <div class="shadow-box" style="box-shadow:rgba(149,157,165,0.2) 0px 8px 24px;"></div>
        <div class="shadow-label">header</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:center;">
        <div class="shadow-box" style="box-shadow:rgba(0,0,0,0.15) 0px 4px 16px;"></div>
        <div class="shadow-label">screenshot</div>
      </div>
    </div>
  </div>
</body>
</html>
