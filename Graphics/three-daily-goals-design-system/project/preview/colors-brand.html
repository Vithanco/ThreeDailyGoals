<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { font-family: var(--font-sans); background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .chip { width: 80px; height: 56px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); }
  .label { font-size: 10px; color: #555; font-weight: 500; }
  .hex   { font-size: 9px; color: #999; font-family: monospace; }
  .big .chip { width: 140px; height: 80px; border-radius: 10px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #999; }
</style>
</head>
<body>
  <div class="section-title">Brand Colors</div>
  <div class="row">
    <div class="swatch big">
      <div class="chip" style="background:#EA580C;"></div>
      <div class="label">Accent / Brand</div>
      <div class="hex">#EA580C</div>
    </div>
    <div class="swatch big">
      <div class="chip" style="background:#000000;"></div>
      <div class="label">Foreground</div>
      <div class="hex">#000000</div>
    </div>
    <div class="swatch big">
      <div class="chip" style="background:#FFFFFF; border:1px solid #ddd;"></div>
      <div class="label">Background</div>
      <div class="hex">#FFFFFF</div>
    </div>
    <div class="swatch big">
      <div class="chip" style="background: linear-gradient(135deg,#EA580C 0%,#FF8000 100%);"></div>
      <div class="label">Accent Gradient</div>
      <div class="hex">Web nav selected</div>
    </div>
  </div>
  <div class="section-title" style="margin-top:4px;">Accent Tints</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#EA580C;"></div><div class="label">100%</div></div>
    <div class="swatch"><div class="chip" style="background:rgba(234,88,12,0.7);"></div><div class="label">70%</div></div>
    <div class="swatch"><div class="chip" style="background:rgba(234,88,12,0.4);"></div><div class="label">40%</div></div>
    <div class="swatch"><div class="chip" style="background:rgba(234,88,12,0.2);"></div><div class="label">20%</div></div>
    <div class="swatch"><div class="chip" style="background:rgba(234,88,12,0.1);"></div><div class="label">10%</div></div>
  </div>
  <div class="section-title" style="margin-top:4px;">Marketing Screenshot Palette</div>
  <div class="row">
    <div class="swatch big">
      <div class="chip" style="background:#FFF9F1; border:1px solid #ddd;"></div>
      <div class="label">Warm Cream</div>
      <div class="hex">#FFF9F1</div>
    </div>
    <div class="swatch big">
      <div class="chip" style="background:#EA580C;"></div>
      <div class="label">Brand Orange</div>
      <div class="hex">#EA580C</div>
    </div>
    <div class="swatch big">
      <div class="chip" style="background:#111111;"></div>
      <div class="label">Near Black</div>
      <div class="hex">#111111</div>
    </div>
  </div>
</body>
</html>
