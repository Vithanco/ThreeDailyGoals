<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { font-family: var(--font-sans); background: #fff; padding: 20px; }
  .row { display: flex; gap: 8px; align-items: flex-end; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .chip { width: 64px; height: 48px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.06); }
  .label { font-size: 9px; color: #777; font-weight: 600; }
  .hex   { font-size: 8px; color: #aaa; font-family: monospace; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="section-title">Neutral Scale</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FAFAFA;"></div><div class="label">50</div><div class="hex">#FAFAFA</div></div>
    <div class="swatch"><div class="chip" style="background:#F5F5F5;"></div><div class="label">100</div><div class="hex">#F5F5F5</div></div>
    <div class="swatch"><div class="chip" style="background:#EEEEEE;"></div><div class="label">200</div><div class="hex">#EEEEEE</div></div>
    <div class="swatch"><div class="chip" style="background:#E0E0E0;"></div><div class="label">300</div><div class="hex">#E0E0E0</div></div>
    <div class="swatch"><div class="chip" style="background:#BDBDBD;"></div><div class="label">400</div><div class="hex">#BDBDBD</div></div>
    <div class="swatch"><div class="chip" style="background:#9E9E9E;"></div><div class="label">500</div><div class="hex">#9E9E9E</div></div>
    <div class="swatch"><div class="chip" style="background:#757575;"></div><div class="label">600</div><div class="hex">#757575</div></div>
    <div class="swatch"><div class="chip" style="background:#616161;"></div><div class="label">700</div><div class="hex">#616161</div></div>
    <div class="swatch"><div class="chip" style="background:#424242;"></div><div class="label">800</div><div class="hex">#424242</div></div>
  </div>
</body>
</html>
